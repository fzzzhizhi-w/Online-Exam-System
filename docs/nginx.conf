# 捷评智航考试系统 - Nginx 配置
# 支持Tomcat集群负载均衡

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10240;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream: $upstream_addr rt: $upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
    client_max_body_size 100m;

    # Tomcat集群定义（加权轮询负载均衡）
    upstream exam_backend {
        # 加权轮询策略
        server 127.0.0.1:8080 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8081 weight=1 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # 前端静态资源
        location / {
            root /usr/share/nginx/html/exam-frontend;
            index index.html;
            try_files $uri $uri/ /index.html;

            # 静态资源缓存
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?)$ {
                expires 7d;
                add_header Cache-Control "public, immutable";
            }
        }

        # 后端API代理
        location /api/ {
            proxy_pass http://exam_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # 针对答题接口优化
            proxy_buffering off;
        }

        # API文档代理
        location /doc.html {
            proxy_pass http://exam_backend;
            proxy_set_header Host $host;
        }

        # 健康检查接口
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }

    # HTTPS配置（生产环境启用）
    # server {
    #     listen 443 ssl http2;
    #     server_name exam.yourdomain.com;
    #     ssl_certificate /etc/ssl/certs/exam.crt;
    #     ssl_certificate_key /etc/ssl/private/exam.key;
    #     ...
    # }
}
