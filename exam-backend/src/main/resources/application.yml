server:
  port: 8080
  tomcat:
    threads:
      max: 500
      min-spare: 50
    connection-timeout: 20000

spring:
  application:
    name: exam-backend
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/exam_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 1
        max-concurrency: 5
        missing-queues-fatal: false
        recovery-interval: 30000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT Configuration
jwt:
  secret: JePaiZhiHangExamSystem2024SecretKeyForJWTTokenGeneration
  expiration: 86400
  refresh-expiration: 604800
  header: Authorization
  prefix: Bearer

# Knife4j API Docs
knife4j:
  enable: true
  setting:
    language: zh-CN
  basic:
    enable: false

logging:
  level:
    com.jepai.exam: DEBUG
    org.springframework.security: INFO
