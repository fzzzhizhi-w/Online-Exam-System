version: '3.8'

services:
  # MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: exam-mysql
    environment:
      MYSQL_ROOT_PASSWORD: exam@2024
      MYSQL_DATABASE: exam_system
      MYSQL_CHARACTER_SET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    networks:
      - exam-net
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: exam-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - exam-net
    restart: unless-stopped

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: exam-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - exam-net
    restart: unless-stopped

  # 后端服务实例1
  exam-backend-1:
    build:
      context: ./exam-backend
      dockerfile: Dockerfile
    container_name: exam-backend-1
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/exam_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: exam@2024
      SPRING_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - exam-net
    restart: unless-stopped

  # 后端服务实例2（集群）
  exam-backend-2:
    build:
      context: ./exam-backend
      dockerfile: Dockerfile
    container_name: exam-backend-2
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/exam_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: exam@2024
      SPRING_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      SERVER_PORT: 8080
    ports:
      - "8081:8080"
    depends_on:
      - mysql
      - redis
      - rabbitmq
    networks:
      - exam-net
    restart: unless-stopped

  # Nginx 反向代理 + 负载均衡
  nginx:
    image: nginx:1.25-alpine
    container_name: exam-nginx
    ports:
      - "80:80"
    volumes:
      - ./docs/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./exam-frontend/dist:/usr/share/nginx/html/exam-frontend:ro
    depends_on:
      - exam-backend-1
      - exam-backend-2
    networks:
      - exam-net
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:

networks:
  exam-net:
    driver: bridge
